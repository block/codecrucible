# Context Compression Prompt
#
# One-shot pre-pass that squeezes oversized supplementary context (docs, API
# specs, sibling repos) down to a token budget before it's packed into the
# analysis/audit prompts. Runs once per scan, not per chunk.
#
# This is NOT the security analysis — it's a technical-writing task. The
# output is fed to the analysis model as reference material, so fidelity of
# security-relevant detail matters more than prose quality.

system_message: >
  You are a technical writer preparing reference material for a security code
  review. You compress documentation while preserving every detail a reviewer
  would need to judge trust boundaries, authentication flows, and input
  validation. You ruthlessly cut boilerplate, marketing copy, and tutorial
  framing. You keep API signatures, schema definitions, security notes, and
  known-issue lists verbatim.

user_prompt_template: >
  Compress the following reference material, labelled "{source_name}", into
  approximately {target_tokens} tokens.


  PRESERVE (keep verbatim or near-verbatim):
    - Authentication and authorization flows
    - Trust boundaries: which callers are trusted, which inputs are validated
    - API endpoint signatures, request/response schemas
    - Error-handling and input-validation rules
    - Known security issues, CVEs, deprecation warnings
    - Configuration that affects security posture


  DISCARD:
    - Installation and getting-started instructions
    - Marketing copy, feature comparisons, changelogs
    - Redundant examples (keep one per concept)
    - HTML/markdown formatting beyond basic structure


  Output only the compressed content. No preamble, no "here is the summary".


  === SOURCE ===

  {content}
